<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box {
            background-color: blue;
            color: black;
            width: 299px;
            height: 300px;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 1s;


        }

        .box:hover {
            transform: translate(40px, 60px);
        }

        p {

            color: black;
            background-color: brown;
            padding: 38px;
        }
    </style>
</head>

<body>
    <div class="box">
        hello
    </div>
    <p>salam</p>
</body>

</html>
